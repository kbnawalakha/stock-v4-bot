name: V4 Stock Bot

on:
  schedule:
    - cron: "5 14 * * 1-5"
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -m unittest discover -s tests

      - run: python src/main_v4.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_REDDIT_BATCH_SIZE: ${{ secrets.GEMINI_REDDIT_BATCH_SIZE }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          CAPITOLTRADES_BASE_URL: ${{ secrets.CAPITOLTRADES_BASE_URL }}
          REDDIT_SUBREDDITS: ${{ secrets.REDDIT_SUBREDDITS }}
          REDDIT_POST_LIMIT: ${{ secrets.REDDIT_POST_LIMIT }}
          BLEND_REDDIT_IN_MAIN_SCORE: ${{ secrets.BLEND_REDDIT_IN_MAIN_SCORE }}
          INCLUDE_HIGH_RISK_MICROCAPS: ${{ secrets.INCLUDE_HIGH_RISK_MICROCAPS }}
          USE_DYNAMIC_UNIVERSE: ${{ secrets.USE_DYNAMIC_UNIVERSE }}
          MAX_RAW_UNIVERSE_SIZE: ${{ secrets.MAX_RAW_UNIVERSE_SIZE }}
          TARGET_STAGE1_SIZE: ${{ secrets.TARGET_STAGE1_SIZE }}
          TARGET_STAGE2_SIZE: ${{ secrets.TARGET_STAGE2_SIZE }}
          TARGET_DEEP_ANALYSIS_SIZE: ${{ secrets.TARGET_DEEP_ANALYSIS_SIZE }}
          MIN_PRICE: ${{ secrets.MIN_PRICE }}
          MIN_MARKET_CAP: ${{ secrets.MIN_MARKET_CAP }}
          INCLUDE_MICROCAPS: ${{ secrets.INCLUDE_MICROCAPS }}
          INCLUDE_REDDIT_IN_UNIVERSE: ${{ secrets.INCLUDE_REDDIT_IN_UNIVERSE }}
          INCLUDE_ETF_HOLDINGS: ${{ secrets.INCLUDE_ETF_HOLDINGS }}
          INCLUDE_RUSSELL_3000: ${{ secrets.INCLUDE_RUSSELL_3000 }}
          INCLUDE_SP500: ${{ secrets.INCLUDE_SP500 }}
          INCLUDE_NASDAQ_100: ${{ secrets.INCLUDE_NASDAQ_100 }}
          MIN_STOCK_PRICE: ${{ secrets.MIN_STOCK_PRICE }}
          MIN_AVG_DAILY_VOLUME: ${{ secrets.MIN_AVG_DAILY_VOLUME }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Persist learning state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions.csv learning_state.json
          if git diff --cached --quiet; then
            echo "No learning updates to commit."
          else
            git commit -m "Update recommendation learning state"
            git push
          fi
