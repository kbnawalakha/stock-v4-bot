name: V4 Stock Bot

on:
  schedule:
    - cron: "5 14 * * 1-5"
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python src/main_v4.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_REDDIT_BATCH_SIZE: ${{ secrets.GEMINI_REDDIT_BATCH_SIZE }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          CAPITOLTRADES_BASE_URL: ${{ secrets.CAPITOLTRADES_BASE_URL }}
          REDDIT_SUBREDDITS: ${{ secrets.REDDIT_SUBREDDITS }}
          REDDIT_POST_LIMIT: ${{ secrets.REDDIT_POST_LIMIT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Persist learning state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions.csv learning_state.json
          if git diff --cached --quiet; then
            echo "No learning updates to commit."
          else
            git commit -m "Update recommendation learning state"
            git push
          fi
