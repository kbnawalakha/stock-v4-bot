name: V4 Stock Bot

on:
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 5 * * 1"
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Schedule guard
        id: schedule_guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_bot=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          hour=$(TZ=America/Los_Angeles date +%H)
          minute=$(TZ=America/Los_Angeles date +%M)
          day=$(TZ=America/Los_Angeles date +%u)
          if { [ "$day" -ge 1 ] && [ "$day" -le 5 ] && [ "$hour" = "06" ] && [ "$minute" = "30" ]; } || \
             { [ "$day" = "7" ] && [ "$hour" = "22" ] && [ "$minute" = "00" ]; }; then
            echo "run_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_bot=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run outside configured Pacific Time schedule. Local time: day=${day} ${hour}:${minute}"
          fi

      - run: python -m unittest discover -s tests
        if: steps.schedule_guard.outputs.run_bot == 'true'

      - run: python src/main_v4.py
        if: steps.schedule_guard.outputs.run_bot == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_REDDIT_BATCH_SIZE: ${{ secrets.GEMINI_REDDIT_BATCH_SIZE }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          CAPITOLTRADES_BASE_URL: ${{ secrets.CAPITOLTRADES_BASE_URL }}
          REDDIT_SUBREDDITS: ${{ secrets.REDDIT_SUBREDDITS }}
          REDDIT_POST_LIMIT: ${{ secrets.REDDIT_POST_LIMIT }}
          BLEND_REDDIT_IN_MAIN_SCORE: ${{ secrets.BLEND_REDDIT_IN_MAIN_SCORE }}
          INCLUDE_HIGH_RISK_MICROCAPS: ${{ secrets.INCLUDE_HIGH_RISK_MICROCAPS }}
          USE_DYNAMIC_UNIVERSE: ${{ secrets.USE_DYNAMIC_UNIVERSE }}
          MAX_RAW_UNIVERSE_SIZE: ${{ secrets.MAX_RAW_UNIVERSE_SIZE }}
          TARGET_STAGE1_SIZE: ${{ secrets.TARGET_STAGE1_SIZE }}
          TARGET_STAGE2_SIZE: ${{ secrets.TARGET_STAGE2_SIZE }}
          TARGET_DEEP_ANALYSIS_SIZE: ${{ secrets.TARGET_DEEP_ANALYSIS_SIZE }}
          HIGH_MOMENTUM_SCAN_LIMIT: ${{ secrets.HIGH_MOMENTUM_SCAN_LIMIT }}
          MIN_PRICE: ${{ secrets.MIN_PRICE }}
          MIN_MARKET_CAP: ${{ secrets.MIN_MARKET_CAP }}
          MIN_RECOMMENDATION_CONFIDENCE: ${{ secrets.MIN_RECOMMENDATION_CONFIDENCE }}
          MAX_RECOMMENDATIONS: ${{ secrets.MAX_RECOMMENDATIONS }}
          INCLUDE_MICROCAPS: ${{ secrets.INCLUDE_MICROCAPS }}
          INCLUDE_REDDIT_IN_UNIVERSE: ${{ secrets.INCLUDE_REDDIT_IN_UNIVERSE }}
          INCLUDE_ETF_HOLDINGS: ${{ secrets.INCLUDE_ETF_HOLDINGS }}
          INCLUDE_RUSSELL_3000: ${{ secrets.INCLUDE_RUSSELL_3000 }}
          INCLUDE_SP500: ${{ secrets.INCLUDE_SP500 }}
          INCLUDE_NASDAQ_100: ${{ secrets.INCLUDE_NASDAQ_100 }}
          MIN_STOCK_PRICE: ${{ secrets.MIN_STOCK_PRICE }}
          MIN_AVG_DAILY_VOLUME: ${{ secrets.MIN_AVG_DAILY_VOLUME }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Persist learning state
        if: steps.schedule_guard.outputs.run_bot == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions.csv learning_state.json
          if git diff --cached --quiet; then
            echo "No learning updates to commit."
          else
            git commit -m "Update recommendation learning state"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                exit 0
              fi
              echo "Push failed on attempt ${attempt}; retrying after remote refresh."
              sleep 5
            done
            echo "Failed to push learning state after retries."
            exit 1
          fi
